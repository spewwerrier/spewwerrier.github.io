<!doctype html>
<html lang="en">

    <body>
        <section class="section">

<h1>404 NOT FOUND</h1>

</section>
    </body>
    <script>
        document.documentElement.setAttribute("data-theme", "pastel");
        function pageDown() {
            window.scrollBy({
                top: window.innerHeight - 130,
                behavior: "smooth",
            });
        }

        function pageUp() {
            window.scrollBy({
                top: -(window.innerHeight - 130),
                behavior: "smooth",
            });
        }

        document.addEventListener("keydown", function (event) {
            if (event.key === "d" || event.key === "D") {
                pageDown();
            }
            if (event.key === "u") {
                pageUp();
            }
        });
    </script>
</html>
